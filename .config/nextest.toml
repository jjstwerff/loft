# cargo-nextest configuration.
#
# The `ci` profile used in .github/workflows/ci.yml tunes nextest for
# GitHub Actions: retry flaky tests once, cap parallelism to the
# runner's reported threads, and use the JUnit reporter so the
# Actions UI can surface failures.

[profile.default]
# Local runs: fail fast, no retries.
failure-output   = "immediate"
success-output   = "never"
status-level     = "pass"

[profile.ci]
# CI runs: retry flaky tests once, emit JUnit for the Actions UI.
retries          = 1
failure-output   = "immediate-final"
success-output   = "never"
status-level     = "pass"
final-status-level = "slow"

[profile.ci.junit]
path = "target/nextest/junit.xml"

# P137 / html_wasm test serialisation.
#
# Every `--html` invocation writes the generated Rust to a fixed path
# (`/tmp/loft_html.rs` / `/tmp/loft_html.wasm`) in the loft driver
# (src/main.rs:1753, 1789).  The in-process `Mutex` in
# tests/html_wasm.rs::build_lock guards parallel *threads* in one
# cargo-test process, but nextest spawns a separate process per test
# — each process has its own `OnceLock`-managed mutex, so the shared
# temp files race and one test's rustc invocation reads the partially
# overwritten intermediate source of another.  Symptoms were flaky
# "loft --html failed for …" and mismatched stdout ("sum=45" vs
# "total=60") across `p137_html_*` runs.
#
# Binding all html_wasm tests to a single-slot test-group serialises
# them at the nextest dispatcher level, crossing the process boundary
# the Rust Mutex can't.  The Mutex remains as belt-and-suspenders for
# plain `cargo test` / developer loops.
[test-groups]
html-wasm-serial = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'binary(html_wasm)'
test-group = 'html-wasm-serial'

[[profile.ci.overrides]]
filter = 'binary(html_wasm)'
test-group = 'html-wasm-serial'
