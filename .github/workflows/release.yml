name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: loft
            archive: loft-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            binary: loft
            archive: loft-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: loft
            archive: loft-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: loft.exe
            archive: loft-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux static build)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin loft --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} loft
          tar czf ${{ matrix.archive }} loft README.md CHANGELOG.md LICENSE

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "loft.exe"
          Compress-Archive -Path loft.exe, README.md, CHANGELOG.md, LICENSE -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  docs:
    name: Deploy HTML docs to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate HTML docs
        run: cargo run --bin gendoc

      # Always rebuild the wasm gallery bundle from the tag's source
      # before deploy — never ship whatever stale doc/pkg/ was in the
      # committed tree.  This is the primary defence against the
      # "Failed to grow table" browser error: users open gallery.html,
      # the JS glue loads loft_bg.wasm, and the two must agree.  By
      # regenerating both here we guarantee they do.
      - name: Install wasm-pack
        run: curl -sSLf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Rebuild gallery assets
        run: make gallery

      # Same story for Brick Buster: the self-contained
      # doc/brick-buster.html embeds a wasm produced by a *different*
      # pipeline (loft --html) than the wasm-pack bundle used by the
      # gallery.  Rebuild it from the tag's source so Pages never
      # ships a stale version.
      - name: Rebuild Brick Buster HTML
        run: make game

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc
          exclude_assets: 'claude/**'

  crates-io:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
