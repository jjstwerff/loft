name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

      - name: Build (no default features)
        run: cargo build --no-default-features

      - name: Test
        run: cargo test

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  # Prevent browser-side "Failed to grow table" / "import mismatch"
  # errors from reaching the deployed site by rebuilding BOTH browser
  # artefacts — the wasm-pack-based gallery+playground bundle and the
  # loft-native --html Brick Buster build — and probing every asset
  # each imports on every PR.  Both pipelines produce a wasm/js pair
  # that must agree; a partial rebuild silently breaks runtime loading.
  # Keeping them in one job reuses the wasm target cache for speed.
  gallery:
    name: Browser build + probe
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: |
          curl -sSLf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-gallery-${{ hashFiles('**/Cargo.lock') }}

      # Instantiate the committed doc/pkg/{loft.js, loft_bg.wasm} pair
      # exactly as the browser would.  A drifted pair fails here with
      # the same LinkError ("Failed to grow table" / "Function import
      # mismatch") that users see on the deployed site — catches the
      # case where one of the two was re-committed without the other
      # (the cause of the PR #165 post-merge breakage).  Runs before
      # make gallery so the failure blames the committed state, not
      # the rebuild.
      - name: Probe committed wasm/js pair
        run: |
          # Instantiate the committed wasm using the committed JS glue
          # exactly as a browser would.  A drifted pair fails here with
          # the identical LinkError ("WebAssembly.Table.grow() failed"
          # or "Function import mismatch") that users see on the
          # deployed site — catches the case where one of the two files
          # was re-committed without the other.
          node --input-type=module -e "
            import { readFileSync } from 'fs';
            import { pathToFileURL } from 'url';
            import { resolve } from 'path';
            const wasm = await WebAssembly.compile(readFileSync('doc/pkg/loft_bg.wasm'));
            const glue = await import(pathToFileURL(resolve('doc/pkg/loft.js')).href);
            try {
              await glue.default(wasm);
              console.log('committed bundle instantiates OK');
            } catch (e) {
              console.error('Committed doc/pkg/loft.js and loft_bg.wasm are out of sync.');
              console.error('Browsers will show the same LinkError on the deployed site:');
              console.error('  ' + (e && e.message || e));
              console.error('Fix: run \`make gallery\` locally and commit BOTH files together.');
              process.exit(1);
            }
          "

      # Rebuilds doc/pkg/ (wasm-pack bundle behind gallery.html +
      # playground.html), verifies every asset HEAD-loads.
      - name: make gallery
        run: make gallery

      # Rebuilds doc/brick-buster.html via `loft --html` against a
      # freshly built wasm32-unknown-unknown libloft.rlib, sanity-checks
      # the output.  Protects the "click-to-play" experience just like
      # `make gallery` protects the demo grid.
      - name: make game
        run: make game

      # NOTE: we deliberately do NOT byte-compare the CI rebuild to
      # the committed doc/pkg/ + doc/brick-buster.html.  Different
      # rustc / wasm-opt versions produce non-bit-identical wasm even
      # for identical source, so a strict diff check is
      # non-deterministic across environments.  The real deploy-time
      # protection lives in .github/workflows/release.yml's docs job
      # (and, long-term, a main-push workflow that rebuilds and
      # commits the bundle back).  What this CI job guarantees is
      # that both pipelines *build* and every asset loads — which
      # catches the common failure mode of a source change that
      # breaks the browser pipeline without the contributor noticing.
